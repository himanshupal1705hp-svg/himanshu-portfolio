<!DOCTYPE html>
<html>
<head>
  <title>Himanshu Web3 Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: monospace;
      color: white;
      background: black;
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* 🌌 BACKGROUND (FIXED ONLINE IMAGE) */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1519125323398-675f0ddb6308?q=80&w=2070&auto=format&fit=crop') no-repeat center/cover;
      opacity: 0.3;
      z-index: -1;
    }

    .main {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 48px;
      text-shadow: 0 0 10px #00ffc3,0 0 30px #00ffc3,0 0 60px #00ffc3;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(10,10,10,0.7);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #00ffc355;
      box-shadow: 0 0 15px #00ffc322;
      transition: all 0.6s ease;
      opacity: 0;
      transform: translateY(40px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .btn {
      padding: 12px 25px;
      background: #00ffc3;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    #chatbox {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 280px;
      background: rgba(0,0,0,0.9);
      border: 1px solid #00ffc3;
      border-radius: 15px;
      padding: 15px;
    }

    input {
      width: 70%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Cursor */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      background: #00ffc3;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 20px #00ffc3;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    .trail {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #00ffc3;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.5;
      z-index: 9998;
    }
  </style>
</head>

<body>

<div id="loader"><h1>Loading Himanshu...</h1></div>

<div class="bg"></div>
<div class="cursor"></div>

<div class="main">

<h1 id="typing"></h1>
<p>Web3 + AI Builder</p>

<button class="btn" onclick="window.location.href='https://x.com/HimanshuWeb3_17'">
Hire Me
</button>

<div class="grid">

<div class="card"><h2>About</h2><p>Building Web3 + AI</p></div>

<div class="card">
<h2>Crypto</h2>
<p id="btc">Loading...</p>
<p id="eth">Loading...</p>
</div>

<div class="card">
<h2>GitHub</h2>
<img src="https://github-readme-stats.vercel.app/api?username=himanshupal1705hp-svg&theme=dark" width="100%">
</div>

<div class="card"><h2>POW</h2><p>Daily Web3 work</p></div>

</div>
</div>

<div id="chatbox">
<p><b>AI 🤖</b></p>
<input id="userInput">
<button onclick="reply()">Send</button>
<p id="botReply"></p>
</div>

<script>

/* Loader */
window.onload = () => {
  setTimeout(() => loader.style.display="none",1500);
};

/* Typing */
let text="Hi, I'm Himanshu 🚀",i=0;
function type(){
 if(i<text.length){
  typing.innerHTML+=text[i++];
  setTimeout(type,50);
 }
}
type();

/* Scroll */
const cards=document.querySelectorAll(".card");
window.addEventListener("scroll",()=>{
 cards.forEach(c=>{
  if(c.getBoundingClientRect().top<window.innerHeight-50){
   c.classList.add("show");
  }
 });
});

/* Crypto */
async function getPrices(){
 try{
  let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
  let d=await r.json();
  btc.innerText="BTC: $"+d.bitcoin.usd;
  eth.innerText="ETH: $"+d.ethereum.usd;
 }catch{
  btc.innerText="Error";
  eth.innerText="Error";
 }
}
getPrices();

/* AI FIX */
async function reply(){
 let input=userInput.value;
 let output=botReply;

 if(!input){
  output.innerText="Type something";
  return;
 }

 output.innerText="Thinking...";

 try{
  let r=await fetch("https://api.affiliateplus.xyz/api/chatbot?message="+encodeURIComponent(input));
  let d=await r.json();
  output.innerText=d.message || "No reply";
 }catch{
  output.innerText="AI offline 😅";
 }
}

/* Cursor */
if(window.innerWidth>768){
 document.addEventListener("mousemove",e=>{
  let c=document.querySelector(".cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";

  let t=document.createElement("div");
  t.className="trail";
  t.style.left=e.clientX+"px";
  t.style.top=e.clientY+"px";
  document.body.appendChild(t);

  setTimeout(()=>t.remove(),400);
 });
}

</script>

</body>
</html>
