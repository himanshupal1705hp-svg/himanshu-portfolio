<!DOCTYPE html>
<html>
<head>
  <title>Himanshu AI Web3 Portfolio</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #00ffc3;
      font-family: monospace;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
      text-shadow: 0 0 20px #00ffc3;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #0a0a0a;
      margin: 15px;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 0 15px #00ffc322;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00ffc3aa;
    }

    .btn {
      padding: 10px 20px;
      background: #00ffc3;
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* 🤖 Chatbot */
    #chatbox {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 250px;
      background: black;
      border: 1px solid #00ffc3;
      border-radius: 10px;
      padding: 10px;
    }

    input {
      width: 80%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🤖 Himanshu AI Web3 Portfolio</h1>
<p>Building in Public | Web3 + AI</p>

<button class="btn" onclick="window.location.href='https://x.com/HimanshuWeb3_17'">
💼 Hire Me
</button>

<div class="container">

  <!-- 🧠 AI SUMMARY -->
  <div class="card">
    <h2>🧠 About Me</h2>
    <p>I’m Himanshu, learning Web3, building in public, and exploring dev + AI daily.</p>
  </div>

  <!-- 🪙 LIVE CRYPTO -->
  <div class="card">
    <h2>🪙 Crypto Prices</h2>
    <p id="btc">BTC: Loading...</p>
    <p id="eth">ETH: Loading...</p>
  </div>

  <!-- 📊 GITHUB -->
  <div class="card">
    <h2>📊 GitHub</h2>
    <img src="https://github-readme-stats.vercel.app/api?username=himanshupal1705hp-svg&theme=dark" width="100%">
  </div>

  <!-- 🐦 AUTO X -->
  <div class="card">
    <h2>🐦 Latest Activity</h2>
    <a href="https://x.com/HimanshuWeb3_17" target="_blank">View My X</a>
  </div>

</div>

<!-- 🤖 CHATBOT -->
<div id="chatbox">
  <p><b>AI Bot 🤖</b></p>
  <input id="userInput" placeholder="Ask me..." />
  <button onclick="reply()">Send</button>
  <p id="botReply"></p>
</div>

<script>
async function getPrices() {
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
  let data = await res.json();

  document.getElementById("btc").innerText = "BTC: $" + data.bitcoin.usd;
  document.getElementById("eth").innerText = "ETH: $" + data.ethereum.usd;
}
getPrices();

// 🤖 Simple AI replies
function reply() {
  let input = document.getElementById("userInput").value.toLowerCase();
  let reply = "I'm learning Web3 🚀";

  if (input.includes("who")) reply = "I'm Himanshu, Web3 builder.";
  if (input.includes("skills")) reply = "Learning Web3, React, and AI.";
  if (input.includes("contact")) reply = "Reach me on X.";

  document.getElementById("botReply").innerText = reply;
}
</script>

</body>
</html>
