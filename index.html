<!DOCTYPE html>
<html>
<head>
  <title>Himanshu Web3 Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: monospace;
      color: white;
      background: black;
      overflow-x: hidden;
    }

    /* 🌌 ANIME BACKGROUND */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('bg.jpg') no-repeat center/cover;
      opacity: 0.25;
      z-index: -1;
    }

    .main {
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 48px;
      text-shadow: 0 0 10px #00ffc3,
                   0 0 30px #00ffc3,
                   0 0 60px #00ffc3;
    }

    /* 📦 GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    /* 💎 CARDS */
    .card {
      background: rgba(10,10,10,0.7);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #00ffc355;
      box-shadow: 0 0 15px #00ffc322;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px #00ffc3aa;
    }

    /* 🎯 BUTTON */
    .btn {
      margin-top: 15px;
      padding: 12px 25px;
      background: #00ffc3;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px #00ffc3;
    }

    /* 🤖 CHATBOX */
    #chatbox {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 280px;
      background: rgba(0,0,0,0.9);
      border: 1px solid #00ffc3;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 0 20px #00ffc355;
    }

    input {
      width: 80%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    /* 🎬 LOADER */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #loader h1 {
      color: #00ffc3;
      text-shadow: 0 0 20px #00ffc3;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="loader">
  <h1>Initializing Web3 + AI System...</h1>
</div>

<div class="bg"></div>

<div class="main">

  <h1>Hi, I'm Himanshu 🚀</h1>
  <p>Web3 + AI Builder | Building in Public</p>

  <button class="btn" onclick="window.location.href='https://x.com/HimanshuWeb3_17'">
    💼 Hire Me
  </button>

  <div class="grid">

    <div class="card">
      <h2>🧠 About</h2>
      <p>Learning Web3, AI & building daily in public.</p>
    </div>

    <div class="card">
      <h2>🪙 Crypto</h2>
      <p id="btc">BTC: Loading...</p>
      <p id="eth">ETH: Loading...</p>
    </div>

    <div class="card">
      <h2>📊 GitHub</h2>
      <img src="https://github-readme-stats.vercel.app/api?username=himanshupal1705hp-svg&theme=dark" width="100%">
    </div>

    <div class="card">
      <h2>📊 Proof of Work</h2>
      <p>Daily Web3 posts</p>
      <p>Airdrop explorer</p>
      <p>Learning dev</p>
    </div>

  </div>

</div>

<!-- 🤖 CHATBOT -->
<div id="chatbox">
  <p><b>AI 🤖</b></p>
  <input id="userInput" placeholder="Ask..." />
  <button onclick="reply()">Send</button>
  <p id="botReply"></p>
</div>

<script>
/* 🎬 Loader */
window.addEventListener("load", function() {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 2000);
});

/* 🌌 Parallax */
window.addEventListener("scroll", function() {
  let scroll = window.scrollY;
  document.querySelector(".bg").style.transform =
    "translateY(" + scroll * 0.3 + "px)";
});

/* 🪙 Crypto API */
async function getPrices() {
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
  let data = await res.json();

  document.getElementById("btc").innerText = "BTC: $" + data.bitcoin.usd;
  document.getElementById("eth").innerText = "ETH: $" + data.ethereum.usd;
}
getPrices();
setInterval(getPrices, 10000);

/* 🤖 AI CHATBOT (FREE API SAFE) */
async function reply() {
  let input = document.getElementById("userInput").value;

  let res = await fetch("https://api.affiliateplus.xyz/api/chatbot?message=" + input + "&botname=HimanshuAI&ownername=Himanshu");

  let data = await res.json();
  document.getElementById("botReply").innerText = data.message;
}
</script>

</body>
</html>
